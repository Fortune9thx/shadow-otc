<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow OTC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --white: #FFFFFF;
            --off: #F7F9F7;
            --off2: #EFF4EF;
            --card: #FFFFFF;

            --g-dark: #052e16;
            --g-mid: #14532d;
            --g-bright: #166534;
            --green: #16a34a;
            --green2: #15803d;
            --green3: #22c55e;
            --green-xl: #4ade80;
            --green-lt: #dcfce7;
            --green-lt2: #f0fdf4;
            --teal: #0d9488;
            --emerald: #059669;

            --ink: #0a0a0a;
            --ink2: #1c1c1c;
            --ink3: #2d2d2d;
            --muted: #6b7280;
            --faint: #9ca3af;
            --line: #e5e7eb;
            --line2: #f3f4f6;

            --amber: #d97706;
            --red: #dc2626;
            --blue: #2563eb;

            --r-xs: 4px;
            --r-sm: 8px;
            --r: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --r-2xl: 24px;
            --sh: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --sh-md: 0 4px 16px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --sh-lg: 0 12px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.06);
            --sh-green: 0 8px 32px rgba(22, 163, 74, 0.2);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--off);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 4px
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(14px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(-8px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.35
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -600px 0
            }

            100% {
                background-position: 600px 0
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px)
            }

            50% {
                transform: translateY(-6px)
            }
        }

        @keyframes orbitRotate {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @keyframes growIn {
            from {
                transform: scale(0.95);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease
        }

        .slide-up {
            animation: slideUp 0.35s ease
        }

        .slide-right {
            animation: slideRight 0.3s ease
        }

        .agent-in {
            animation: slideLeft 0.3s ease
        }

        .grow-in {
            animation: growIn 0.25s ease
        }

        .skeleton {
            background: linear-gradient(90deg, var(--line2) 25%, #e9ebea 50%, var(--line2) 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }

        .spin-el {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(22, 163, 74, 0.2);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle
        }

        .spin-sm {
            width: 11px;
            height: 11px;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle
        }

        /* =========================================
   LAYOUT
   ========================================= */
        .app {
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            max-width: 100vw
        }

        /* =========================================
   SIDEBAR
   ========================================= */
        .sidebar {
            width: 248px;
            flex-shrink: 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 60;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, var(--g-dark) 0%, var(--g-mid) 60%, var(--g-bright) 100%);
            overflow: hidden;
        }

        /* Decorative orb in sidebar */
        .sidebar-orb {
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .sidebar-orb2 {
            position: absolute;
            bottom: 60px;
            left: -60px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Grid lines decoration */
        .sidebar-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        .sidebar-logo {
            position: relative;
            z-index: 1;
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            animation: float 4s ease-in-out infinite;
        }

        .logo-mark svg {
            width: 20px;
            height: 20px;
            color: var(--green-xl)
        }

        .logo-wordmark {
            font-size: 16px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.4px
        }

        .logo-sub {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-top: 2px
        }

        /* Wallet button in sidebar */
        .sidebar-wallet {
            position: relative;
            z-index: 1;
            padding: 14px 16px 0;
        }

        .wallet-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: var(--r);
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: white
        }

        .wallet-btn.connected {
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.25);
            color: var(--green3)
        }

        .wallet-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0
        }

        /* Nav */
        .sidebar-nav {
            position: relative;
            z-index: 1;
            padding: 14px 12px 0;
            flex: 1
        }

        .nav-section {
            font-size: 9.5px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1.5px;
            padding: 0 8px 8px;
            text-transform: uppercase
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
            border: none;
            background: none;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.85)
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        /* Network info */
        .sidebar-net {
            position: relative;
            z-index: 1;
            padding: 14px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            margin-top: auto;
        }

        .net-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .net-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green3);
            flex-shrink: 0;
            animation: pulse 2s infinite
        }

        .net-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7)
        }

        .net-sub {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 1px
        }

        .net-contract {
            font-size: 10px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--r-xs);
            padding: 6px 10px;
            word-break: break-all;
            line-height: 1.5;
        }

        /* =========================================
   MAIN
   ========================================= */
        .main {
            margin-left: 248px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
            min-width: 0;
            width: calc(100vw - 248px);
            max-width: calc(100vw - 248px)
        }

        /* TOPBAR */
        .topbar {
            height: 64px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .page-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.3px
        }

        .page-desc {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--r-sm);
            padding: 9px 18px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-green {
            background: linear-gradient(135deg, var(--green), var(--g-mid));
            color: white;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.25);
        }

        .btn-green:hover {
            background: linear-gradient(135deg, var(--green2), var(--g-dark));
            box-shadow: var(--sh-green);
            transform: translateY(-1px)
        }

        .btn-green:active {
            transform: translateY(0)
        }

        .btn-green:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink3);
            border: 1.5px solid var(--line)
        }

        .btn-ghost:hover {
            background: var(--line2);
            border-color: #d1d5db
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1.5px solid #fecaca
        }

        .btn-danger:hover {
            background: #fff5f5
        }

        .btn-sm {
            padding: 7px 14px;
            font-size: 12px;
            border-radius: 6px
        }

        .btn-xs {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 5px
        }

        /* PAGE BODY */
        .page-body {
            padding: 24px 24px;
            flex: 1;
            overflow: hidden;
            min-width: 0;
            width: 100%;
            max-width: 100%
        }

        /* =========================================
   HERO SECTION
   ========================================= */
        .hero {
            border-radius: var(--r-2xl);
            background: linear-gradient(135deg, var(--g-dark) 0%, var(--g-mid) 50%, var(--g-bright) 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            padding: 32px 36px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--sh-green);
        }

        /* Hero decorative elements */
        .hero-circle1 {
            position: absolute;
            top: -60px;
            right: -40px;
            width: 220px;
            height: 220px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }

        .hero-circle2 {
            position: absolute;
            top: -20px;
            right: 20px;
            width: 140px;
            height: 140px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .hero-circle3 {
            position: absolute;
            bottom: -80px;
            left: 35%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.07) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-dot-grid {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .hero-badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green-xl);
            flex-shrink: 0;
            animation: pulse 2s infinite
        }

        .hero-title {
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.8px;
            line-height: 1.15;
            margin-bottom: 10px;
            max-width: 520px;
        }

        .hero-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.7;
            max-width: 460px;
            font-weight: 400;
            margin-bottom: 24px;
        }

        .hero-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .hero-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        .hero-tag svg {
            width: 11px;
            height: 11px;
            color: var(--green-xl)
        }

        /* =========================================
   STAT CARDS
   ========================================= */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
            min-width: 0
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            padding: 20px;
            box-shadow: var(--sh);
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        .stat-card:hover {
            box-shadow: var(--sh-md);
            transform: translateY(-2px)
        }

        /* Accent corner */
        .stat-accent {
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            border-radius: 0 var(--r-lg) 0 100%;
            opacity: 0.08;
        }

        .sa-green {
            background: var(--green)
        }

        .sa-teal {
            background: var(--teal)
        }

        .sa-dark {
            background: var(--g-dark)
        }

        .sa-emerald {
            background: var(--emerald)
        }

        .stat-icon-wrap {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .stat-icon-wrap svg {
            width: 17px;
            height: 17px
        }

        .si-green {
            background: var(--green-lt);
        }

        .si-green svg {
            color: var(--green)
        }

        .si-teal {
            background: #ccfbf1;
        }

        .si-teal svg {
            color: var(--teal)
        }

        .si-dark {
            background: var(--green-lt2);
        }

        .si-dark svg {
            color: var(--g-bright)
        }

        .si-emerald {
            background: #d1fae5;
        }

        .si-emerald svg {
            color: var(--emerald)
        }

        .stat-num {
            font-size: 30px;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.8px;
            line-height: 1;
            margin-bottom: 6px
        }

        .stat-num.c-green {
            color: var(--green)
        }

        .stat-num.c-teal {
            color: var(--teal)
        }

        .stat-num.c-dark {
            color: var(--g-dark)
        }

        .stat-num.c-emerald {
            color: var(--emerald)
        }

        .stat-lbl {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted)
        }

        /* =========================================
   MAIN GRID
   ========================================= */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 16px;
            min-width: 0;
            width: 100%;
            max-width: 100%;
            overflow: hidden
        }

        .left-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
            overflow: hidden;
            width: 100%
        }

        /* =========================================
   CARD BASE
   ========================================= */
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--r-xl);
            box-shadow: var(--sh);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: var(--sh-md)
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--line);
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.2px
        }

        .card-desc {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px
        }

        .card-body {
            padding: 20px 22px
        }

        /* =========================================
   DEAL TABLE
   ========================================= */
        .deal-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed
        }

        .deal-table th:nth-child(1),
        .deal-table td:nth-child(1) {
            width: 44px
        }

        .deal-table th:nth-child(3),
        .deal-table td:nth-child(3) {
            width: 88px
        }

        .deal-table th:nth-child(4),
        .deal-table td:nth-child(4) {
            width: 84px
        }

        .deal-table th:nth-child(5),
        .deal-table td:nth-child(5) {
            width: 100px
        }

        .deal-table th:nth-child(6),
        .deal-table td:nth-child(6) {
            width: 40px
        }

        .deal-table th {
            font-size: 11px;
            font-weight: 700;
            color: var(--faint);
            padding: 0 16px 12px;
            text-align: left;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--line);
        }

        .deal-table td {
            padding: 12px 10px;
            font-size: 12.5px;
            border-bottom: 1px solid var(--line2);
            overflow: hidden
        }

        .deal-table tr:last-child td {
            border-bottom: none
        }

        .deal-table tbody tr {

            color: white

            width: 13px;
            height: 13px
        }

        .modal-body {
            padding: 28px

        .info-block {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 22px
        }

        .info-field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .info-field-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--faint);

        }

        .info-field-val {
            font-size: 13.5px;
            color: var(--ink2);
            font-weight: 500;
            word-break: break-all
        }

        .info-field-val.green {
            color: var(--green);
            font-weight: 700;
            font-size: 18px
        }

        .info-field-val.mono {
            font-family: monospace;
            font-size: 11.5px
        }

        /* Timeline */
        .tl {
            display: flex;
            flex-direction: column
        }

        .tl-row {
            display: flex;
            gap: 14px
        }

        .tl-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 26px;
            flex-shrink: 0
        }

        .tl-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--line);
            background: white;
            flex-shrink: 0;
            margin-top: 4px;
            transition: all 0.3s
        }

        .tl-dot.done {
            border-color: var(--green);
            background: var(--green)
        }

        .tl-dot.active {
            border-color: var(--green);
            background: var(--green);
            animation: pulse 1.5s infinite
        }

        .tl-line {
            width: 1.5px;
            flex: 1;
            background: var(--line);
            margin: 4px 0;
            min-height: 16px
        }

        .tl-line.done {
            background: var(--green-lt)
        }

        .tl-body {
            padding-bottom: 18px;
            flex: 1
        }

        .tl-lbl {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted)
        }

        .tl-lbl.done {
            color: var(--g-bright)
        }

        .tl-lbl.active {
            color: var(--green)
        }

        .tl-sub {
            font-size: 11.5px;
            color: var(--faint);
            margin-top: 2px
        }

        /* TEE chip */
        .tee-chip {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: var(--green-lt2);
            border: 1px solid var(--green-lt);
            border-radius: var(--r);
            padding: 14px 16px;
        }

        .tee-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--green-lt);
            border: 1px solid #86efac;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .tee-icon svg {
            width: 14px;
            height: 14px;
            color: var(--green)
        }

        .tee-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--g-dark);
            margin-bottom: 3px
        }

        .tee-sub {
            font-size: 11.5px;
            color: var(--muted);
            line-height: 1.6
        }

        /* Wallet modal */
        .wallet-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border: 1.5px solid var(--line);
            border-radius: var(--r);
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 10px;
            background: var(--off);
        }

        .wallet-option:hover {
            border-color: var(--green);
            background: var(--green-lt2)
        }

        .wallet-emoji {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: white;
            border: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0
        }

        .wallet-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink)
        }

        .wallet-desc {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px
        }

        .wallet-network-note {
            margin-top: 14px;
            padding: 12px 14px;
            background: var(--green-lt2);
            border: 1px solid var(--green-lt);
            border-radius: var(--r-sm);
        }

        .wnn-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--g-dark);
            margin-bottom: 3px
        }

        .wnn-sub {
            font-size: 11px;
            color: var(--muted)
        }

        /* TOAST */
        .toast-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--ink);
            color: white;
            padding: 12px 18px;
            border-radius: var(--r);
            box-shadow: var(--sh-lg);
            font-size: 13px;
            font-weight: 500;
            min-width: 240px;
            pointer-events: all;
            animation: slideRight 0.3s ease;
        }

        .toast svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0
        }

        .ts-success svg {
            color: var(--green3)
        }

        .ts-error svg {
            color: #f87171
        }

        .ts-info svg {
            color: #60a5fa
        }

        /* EMPTY */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 56px 24px;
            text-align: center
        }

        .empty-ico {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--off2);
            border: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px
        }

        .empty-ico svg {
            width: 22px;
            height: 22px;
            color: var(--faint)

        .empty-t {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink3);
            margin-bottom: 5px
        }

        .empty-s {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            max-width: 240px

        /* =========================================
   RESPONSIVE
   ========================================= */
        /* Mobile hamburger button */
        .mob-menu-btn {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 200;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--g-dark);
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .mob-menu-btn svg {
            width: 18px;
            height: 18px;
            color: white
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 55;
        }

        @media(max-width:1100px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr)
            }

            .main-grid {
                grid-template-columns: 1fr
            }

            .main {
                width: calc(100vw - 248px);
                max-width: calc(100vw - 248px)
            }
        }

        @media(max-width:900px) {
            .main-grid {
                grid-template-columns: 1fr
            }

            .create-panel {
                margin-top: 0

        }

        @media(max-width:768px) {
            .mob-menu-btn {
                display: flex

            .sidebar-overlay.open {
                display: block
            }

            .sidebar {
                transform: translateX(-100%);

            }

            .sidebar.open {
                transform: translateX(0)

            .main {
                margin-left: 0;
                width: 100vw;
                max-width: 100vw
            }

            .page-body {
                padding: 16px 14px
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px
            }

            .main-grid {
                grid-template-columns: 1fr;
                gap: 14px
            }

            .topbar {
                padding: 0 14px 0 60px
            }

            .page-label {
                font-size: 13px
            }

            .topbar-actions .btn-ghost:not(:last-child) {
                display: none
            }

            .hero {
                padding: 20px 18px;
                border-radius: var(--r-xl)

            .hero-title {
                font-size: 22px
            }

            .hero-sub {
                font-size: 13px

            .hero-tags {

            .hero-tag {

            }

            .stat-num {

            }

            .card-top {
                padding: 14px 16px

            .card-body {
                padding: 14px 16px

                display: none
            }

                padding: 10px 14px
            }

                padding: 10px 12px

        @media(max-width:480px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);

            .stat-card {

        .app {
            overflow-x: hidden
        }

        .deal-table {
            table-layout: fixed;
            width: 100%
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        /* Create Deal Panel */

            const [budget, setBudget] = useState('');
            const [loading, setLoading] = useState(false);
            const [pstep, setPstep] = useState(0);

            async function go() {
                if (!intent.trim()) { addToast('Please enter an intent for this deal', 'error'); return; }
                if (!budget || parseFloat(budget) < 0.005) { addToast('Minimum budget is 0.005 RITUAL', 'error'); return; }
                setLoading(true); setPstep(1);
                addLog({ type: 'info', msg: `Initiating deal: "${intent.slice(0, 42)}..."` });
                try {
                    await fetch(`${API}/deal/create`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ intent, budget }) });
                    addToast('Deal pipeline started successfully', 'success');
                    setTimeout(() => { setPstep(2); addLog({ type: 'pending', msg: <>Buyer agent <b>locking funds</b> on-chain</> }); }, 500);
                    setTimeout(() => { setPstep(3); addLog({ type: 'pending', msg: <>Seller agent <b>evaluating the offer</b></> }); }, 3500);
                    setTimeout(() => { setPstep(4); addLog({ type: 'pending', msg: <>Verifier <b>checking condition</b> via HTTP fetch</> }); }, 7500);
                    setTimeout(() => {
                        setPstep(0); setLoading(false);
                        addLog({ type: 'success', msg: <><b>Pipeline complete.</b> Deal is executing autonomously</> });
                        setIntent(''); setBudget(''); onCreated();
                    }, 14000);
                } catch (e) {
                    setLoading(false); setPstep(0);
                    addLog({ type: 'warning', msg: 'Backend offline. Demo mode is active' });
                    addToast('Cannot reach backend. Run: npm run server', 'error');

                                    {[Ic.file, Ic.clock, Ic.check, Ic.shield][i]}
                                </div>
                                {loading ? <div className="skeleton" style={{ height: 34, width: '55%', marginBottom: 8 }} /> : <div className={`stat-num ${st.cls}`}>{st.val}</div>}
                                <div className="stat-lbl">{st.label}</div>
                            </div>
                        ))}
                    </div>

                    {/* Main grid */}
                    <div className="main-grid">
                        <div className="left-stack">

                            {/* Deals table */}
                            <div className="card">
                                <div className="card-top">
                                    <div>
                                        <div className="card-title">Live Deals</div>
                                        <div className="card-desc">{deals.length} deal{deals.length !== 1 ? 's' : ''} recorded on Ritual Testnet</div>
                                    </div>
                                    <button className="btn btn-ghost btn-sm" onClick={() => { }}>View all</button>
                                </div>
                                {loading ? (
                                    <div style={{ padding: '20px 22px', display: 'flex', flexDirection: 'column', gap: 14 }}>
                                        {[1, 2, 3].map(i => <div key={i} className="skeleton" style={{ height: 18 }} />)}
                                    </div>
                                ) : deals.length === 0 ? (
                                    <div className="empty-state">
                                        <div className="empty-ico">{Ic.file}</div>
                                        <div className="empty-t">No deals yet</div>
                                        <div className="empty-s">Create your first autonomous deal using the panel on the right</div>
                                    </div>
                                ) : (
                                    <div style={{ overflowX: 'auto' }}>
                                        <table className="deal-table">
                                            <thead>
                                                <tr><th>ID</th><th>Intent</th><th>Amount</th><th>Buyer</th><th>Status</th><th></th></tr>
                                            </thead>
                                            <tbody>
                                                {[...deals].reverse().map(d => (
                                                    <tr key={d.dealId} onClick={() => onSelect(d)}>
                                                        <td><span className="deal-id">#{d.dealId}</span></td>
                                                        <td><span className="deal-intent-text">{d.intent}</span></td>
                                                        <td><span className="deal-amount-text">{parseFloat(d.amount).toFixed(4)}</span></td>
                                                        <td><span className="deal-addr-text">{shortAddr(d.buyer)}</span></td>
                                                        <td><Badge status={d.status} /></td>
                                                        <td>
                                                            <button className="btn btn-ghost btn-xs" onClick={e => { e.stopPropagation(); onSelect(d); }}>
                                                                {Ic.eye}
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>

                            <AgentPanel logs={logs} />
                        </div>

                        <CreatePanel onCreated={onCreated} addToast={addToast} addLog={addLog} />
                    </div>
                </div>
            );
        }

        /* All Deals Page */
        function AllDeals({ deals, loading, onSelect }) {
            return (
                <div className="page-body fade-in">
                    <div className="card">
                        <div className="card-top">
                            <div>
                                <div className="card-title">All Deals</div>
                                <div className="card-desc">Full history on Ritual Testnet. Contract: {CONTRACT.slice(0, 14)}...</div>
                            </div>
                        </div>
                        {loading ? (
                            <div style={{ padding: '20px 22px', display: 'flex', flexDirection: 'column', gap: 14 }}>
                                {[1, 2, 3, 4].map(i => <div key={i} className="skeleton" style={{ height: 18 }} />)}
                            </div>
                        ) : deals.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-ico">{Ic.file}</div>
                                <div className="empty-t">No deals yet</div>
                                <div className="empty-s">Deals will appear here once created</div>
                            </div>
                        ) : (
                            <div style={{ overflowX: 'auto' }}>
                                <table className="deal-table">
                                    <thead>
                                        <tr><th>ID</th><th>Intent</th><th>Amount</th><th>Buyer</th><th>Seller</th><th>Status</th><th></th></tr>
                                    </thead>
                                    <tbody>
                                        {[...deals].reverse().map(d => (
                                            <tr key={d.dealId} onClick={() => onSelect(d)}>
                                                <td><span className="deal-id">#{d.dealId}</span></td>
                                                <td><span className="deal-intent-text">{d.intent}</span></td>
                                                <td><span className="deal-amount-text">{parseFloat(d.amount).toFixed(4)} RITUAL</span></td>
                                                <td><span className="deal-addr-text">{shortAddr(d.buyer)}</span></td>
                                                <td><span className="deal-addr-text">{shortAddr(d.seller)}</span></td>
                                                <td><Badge status={d.status} /></td>
                                                <td>
                                                    <button className="btn btn-ghost btn-xs" onClick={e => { e.stopPropagation(); onSelect(d); }}>
                                                        View {Ic.arrow}
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* Toasts */
        function Toasts({ items }) {
            return (
                <div className="toast-wrap">
                    {items.map(t => (
                        <div key={t.id} className={`toast ts-${t.type}`}>
                            {t.type === 'success' && Ic.check}
                            {t.type === 'error' && Ic.err}
                            {t.type === 'info' && Ic.info}
                            <span>{t.msg}</span>
                        </div>
                    ))}
                </div>
            );
        }

        /* ROOT APP */
        function App() {
            const [page, setPage] = useState('dashboard');
            const [deals, setDeals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [logs, setLogs] = useState(INIT_LOGS);
            const [selected, setSelected] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [wallet, setWallet] = useState(null);
            const [showWallet, setShowWallet] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const lid = useRef(400);

            function addToast(msg, type = 'info') {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3800);
            }

            function addLog(log) {
                setLogs(p => [...p.slice(-60), { ...log, id: ++lid.current, time: new Date().toLocaleTimeString('en-US', { hour12: false }) }]);
            }

            async function load() {
                try {
                    const r = await fetch(`${API}/deals`);
                    const d = await r.json();
                    const n = parseInt(d.total || 0);
                    if (!n) { setDeals([]); setLoading(false); return; }
                    const ps = [];
                    for (let i = 0; i < n; i++) ps.push(fetch(`${API}/deal/${i}`).then(r => r.json()).catch(() => null));
                    setDeals((await Promise.all(ps)).filter(Boolean));
                } catch (e) {
                    setDeals(MOCK);
                    addLog({ type: 'warning', msg: 'Demo mode active. Backend not connected.' });
                } finally { setLoading(false); }
            }

            useEffect(() => { load(); const t = setInterval(load, 15000); return () => clearInterval(t); }, []);

            const nav = [
                { key: 'dashboard', label: 'Dashboard', icon: Ic.grid },
                { key: 'deals', label: 'All Deals', icon: Ic.file },
            ];

            return (
                <div className="app">
                    {/* Mobile menu button */}
                    <button className="mob-menu-btn" onClick={() => setSidebarOpen(true)}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>
                    </button>
                    {/* Sidebar overlay for mobile */}
                    <div className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />
                    {/* Sidebar */}
                    <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-orb" /><div className="sidebar-orb2" /><div className="sidebar-grid" />

                        <div className="sidebar-logo">
                            <div className="logo-mark">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z" /><path d="M2 17l10 5 10-5" /><path d="M2 12l10 5 10-5" />
                                </svg>
                            </div>
                            <div>
                                <div className="logo-wordmark">Shadow OTC</div>
                                <div className="logo-sub">RITUAL CHAIN</div>
                            </div>
                        </div>

                        <div className="sidebar-wallet">
                            <button className={`wallet-btn ${wallet ? 'connected' : ''}`} onClick={() => wallet ? null : setShowWallet(true)}>
                                {Ic.wallet}
                                <span style={{ flex: 1, textAlign: 'left' }}>{wallet ? shortAddr(wallet.address) : 'Connect Wallet'}</span>
                                {wallet && <div style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--green3)', flexShrink: 0 }} />}
                            </button>
                        </div>

                        <div style={{ padding: '8px 12px 0' }}>
                            <div className="nav-section">Menu</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                                {nav.map(n => (
                                    <button key={n.key} className={`nav-item ${page === n.key ? 'active' : ''}`} onClick={() => { setPage(n.key); setSidebarOpen(false) }}>
                                        {n.icon}{n.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="sidebar-net">
                            <div className="net-row">
                                <div className="net-dot" />
                                <div>
                                    <div className="net-label">Ritual Testnet</div>
                                    <div className="net-sub">Chain ID 1979</div>
                                </div>
                            </div>
                            <div className="net-contract">{CONTRACT}</div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="main">
                        <div className="topbar">
                            <div>
                                <div className="page-label">{page === 'dashboard' ? 'Dashboard' : 'All Deals'}</div>
                                <div className="page-desc">{page === 'dashboard' ? 'Shadow OTC overview and deal activity' : 'Complete deal history on Ritual Testnet'}</div>
                            </div>
                            <div className="topbar-actions">
                                {!wallet && (
                                    <button className="btn btn-ghost btn-sm" onClick={() => setShowWallet(true)}>
                                        {Ic.wallet} Connect Wallet
                                    </button>
                                )}
                                <button className="btn btn-ghost btn-sm" onClick={load}>{Ic.refresh} Refresh</button>
                                {page === 'dashboard' && (
                                    <button className="btn btn-green btn-sm" onClick={() => document.querySelector('.form-textarea')?.focus()}>
                                        {Ic.plus} New Deal
                                    </button>
                                )}
                            </div>
                        </div>

                        {page === 'dashboard' && (
                            <Dashboard
                                deals={deals} logs={logs} loading={loading}
                                onSelect={setSelected} onCreated={load}
                                addToast={addToast} addLog={addLog}
                            />
                        )}
                        {page === 'deals' && <AllDeals deals={deals} loading={loading} onSelect={setSelected} />}
                    </main>

                    {selected && <DealModal deal={selected} onClose={() => setSelected(null)} />}
                    {showWallet && <WalletModal onClose={() => setShowWallet(false)} onConnect={w => { setWallet(w); addToast('Wallet connected: ' + shortAddr(w.address), 'success'); addLog({ type: 'success', msg: 'Wallet connected: ' + shortAddr(w.address) }); }} />}
                    <Toasts items={toasts} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
